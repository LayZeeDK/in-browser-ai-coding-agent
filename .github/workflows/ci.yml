name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  actions: read
  contents: read
  packages: read

jobs:
  ghcr:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.base }}
    steps:
      - id: image
        run: echo "base=ghcr.io/${GITHUB_REPOSITORY,,}/playwright" >> "$GITHUB_OUTPUT"

  format:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - run: npm ci
      - run: npm exec nx -- format:check

  lint-typecheck-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - run: npm ci
      - run: npm exec nx -- run-many -t lint typecheck build

  test:
    needs: ghcr
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chrome-beta
            project: chrome-gemini-nano
            cache-key: chrome-beta-cpu-container-v2
            runner: ubuntu-latest
            xvfb: 'xvfb-run --auto-servernum'
            container: true
          - browser: msedge-dev
            project: edge-phi4-mini
            cache-key: msedge-dev-ai-model-windows11-arm-v2
            runner: windows-11-arm
            xvfb: ''
            container: false
    # Container only for jobs that opt in; no-op otherwise
    container: ${{ matrix.container && fromJSON(format('{{"image":"{0}-{1}:latest","options":"--ipc=host --user 1001"}}', needs.ghcr.outputs.image, matrix.browser)) || '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: ${{ matrix.container && 'npm' || '' }}

      # Windows ARM: cache node_modules directly, skip npm ci on hit
      - name: Restore node_modules cache
        if: ${{ !matrix.container }}
        id: node-modules
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ runner.arch }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: ${{ matrix.container || steps.node-modules.outputs.cache-hit != 'true' }}
        run: npm ci

      - name: Save node_modules cache
        if: ${{ !matrix.container && steps.node-modules.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ runner.arch }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install ${{ matrix.browser }}
        if: ${{ !matrix.container }}
        run: npx playwright install ${{ matrix.browser }} --with-deps

      - name: Restore AI model cache
        uses: actions/cache/restore@v5
        id: model-cache
        with:
          path: .playwright-profiles/${{ matrix.browser }}
          key: ${{ matrix.cache-key }}-run${{ github.run_number }}
          restore-keys: |
            ${{ matrix.cache-key }}-run
            ${{ matrix.cache-key }}

      - name: Bootstrap AI model
        id: bootstrap
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: ${{ matrix.xvfb }} node scripts/bootstrap-ai-model.mjs --browser ${{ matrix.browser }} --profile .playwright-profiles/${{ matrix.browser }} --timeout 600000

      - name: Run e2e tests (${{ matrix.project }})
        if: steps.bootstrap.outcome != 'failure'
        id: e2e-tests
        timeout-minutes: 45
        run: ${{ matrix.xvfb }} npm exec nx -- e2e in-browser-ai-coding-agent-e2e -- --project=${{ matrix.project }}

      - name: Run unit tests (${{ matrix.project }})
        if: ${{ !cancelled() && steps.bootstrap.outcome != 'failure' }}
        id: unit-tests
        timeout-minutes: 45
        shell: bash
        run: |
          set -o pipefail
          ${{ matrix.xvfb }} npm exec nx -- test in-browser-ai-coding-agent 2>&1 | tee unit-test-output.log
        env:
          CI_VITEST_BROWSER_INSTANCE: ${{ matrix.project }}

      - name: Write prompt responses to job summary
        if: ${{ !cancelled() && steps.bootstrap.outcome != 'failure' }}
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const log = fs.readFileSync('unit-test-output.log', 'utf8').replace(/\x1b\[[0-9;]*m/g, '');
            const re = /\[unit\] (.+?): \"(.+?)\"\n\[unit-response\]([\s\S]*?)\[\/unit-response\]/g;
            let md = '', m;
            while ((m = re.exec(log))) {
              md += '### Unit Test ' + m[1] + '\n\n**Prompt:** ' + m[2] + '\n\n**Response:** ' + m[3] + '\n\n';
            }
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md || '_No prompt responses captured_\n');
          "

      - name: Save AI model cache (post-test)
        if: ${{ !cancelled() }}
        uses: actions/cache/save@v5
        with:
          path: .playwright-profiles/${{ matrix.browser }}
          key: ${{ matrix.cache-key }}-run${{ github.run_number }}
