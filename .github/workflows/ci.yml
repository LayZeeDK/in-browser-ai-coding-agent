name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  format:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - run: npm ci
      - run: npm exec nx -- format:check

  lint-typecheck-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - run: npm ci
      - run: npm exec nx -- run-many -t lint typecheck build

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chrome-beta
            project: chrome-gemini-nano
            cache-key: chrome-beta-ai-model-v1
          - browser: msedge-dev
            project: edge-phi4-mini
            cache-key: msedge-dev-ai-model-v1
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      # Free disk space for on-device AI models.
      # See https://github.com/actions/runner-images/issues/2840
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android  # ~14 GB Android SDK
          sudo rm -rf /usr/share/dotnet        # ~3 GB .NET SDK
          sudo rm -rf /opt/ghc                 # ~2 GB Haskell/GHC
          sudo rm -rf /usr/local/share/boost   # ~1.5 GB Boost C++ libs
          df -h /

      - uses: nrwl/nx-set-shas@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - run: npm ci

      - name: Install ${{ matrix.browser }}
        run: npx playwright install ${{ matrix.browser }} --with-deps

      - name: Restore AI model cache
        uses: actions/cache/restore@v4
        id: model-cache
        with:
          path: .playwright-profiles/${{ matrix.browser }}
          key: ${{ matrix.cache-key }}

      - name: Bootstrap AI model
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: node scripts/bootstrap-ai-model.mjs --browser ${{ matrix.browser }} --profile .playwright-profiles/${{ matrix.browser }} --timeout 300000

      - name: Save AI model cache
        if: steps.model-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .playwright-profiles/${{ matrix.browser }}
          key: ${{ matrix.cache-key }}

      - name: Run unit tests (${{ matrix.project }})
        run: npm exec nx -- test in-browser-ai-coding-agent --project=${{ matrix.project }}

      - name: Run e2e tests (${{ matrix.project }})
        run: npm exec nx -- e2e in-browser-ai-coding-agent-e2e --project=${{ matrix.project }}
