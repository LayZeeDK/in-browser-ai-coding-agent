name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  actions: read
  contents: read
  packages: read

jobs:
  ghcr:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.base }}
    steps:
      - id: image
        run: echo "base=ghcr.io/${GITHUB_REPOSITORY,,}/playwright" >> "$GITHUB_OUTPUT"

  format:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - run: npm ci
      - run: npm exec nx -- format:check

  lint-typecheck-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - run: npm ci
      - run: npm exec nx -- run-many -t lint typecheck build

  test-chrome:
    needs: ghcr
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.ghcr.outputs.image }}-chrome-beta:latest
      options: --ipc=host --user 1001
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - run: npm ci

      - name: Copy model profile from container image
        run: |
          cp -r /home/pwuser/.ai-model-profile/chrome-beta .playwright-profiles/chrome-beta
          echo "Profile contents:"
          ls -la .playwright-profiles/chrome-beta/

      - name: Run e2e tests
        id: e2e-tests
        timeout-minutes: 45
        run: xvfb-run --auto-servernum npm exec nx -- e2e in-browser-ai-coding-agent-e2e -c chrome

      - name: Kill lingering Chrome processes
        if: ${{ !cancelled() }}
        run: |
          pkill -9 -f chrome 2>/dev/null || true
          sleep 2

      - name: Run unit tests
        if: ${{ !cancelled() }}
        id: unit-tests
        timeout-minutes: 45
        run: |
          set -o pipefail
          xvfb-run --auto-servernum npm exec nx -- test-chrome in-browser-ai-coding-agent 2>&1 | tee unit-test-output.log

      - name: Write prompt responses to job summary
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const log = fs.readFileSync('unit-test-output.log', 'utf8').replace(/\x1b\[[0-9;]*m/g, '');
            const re = /\[unit\] (.+?): \"(.+?)\"\n\[unit-response\]([\s\S]*?)\[\/unit-response\]/g;
            let md = '', m;
            while ((m = re.exec(log))) {
              md += '### Unit Test ' + m[1] + '\n\n**Prompt:** ' + m[2] + '\n\n**Response:** ' + m[3] + '\n\n';
            }
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md || '_No prompt responses captured_\n');
          "

  test-edge:
    runs-on: windows-11-arm
    strategy:
      fail-fast: false
      matrix:
        include:
          - perf-param: '3'
            cache-key: msedge-dev-ai-model-windows11-arm-v3
          - perf-param: '1'
            cache-key: msedge-dev-perf1-windows11-arm-v3
          - perf-param: '2'
            cache-key: msedge-dev-perf2-windows11-arm-v3
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - name: Restore node_modules cache
        id: node-modules
        uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ runner.arch }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Save node_modules cache
        if: steps.node-modules.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ runner.arch }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install msedge-dev
        run: npx playwright install msedge-dev --with-deps

      - name: Restore AI model cache
        uses: actions/cache/restore@v5
        id: model-cache
        with:
          path: .playwright-profiles/msedge-dev
          key: ${{ matrix.cache-key }}-run${{ github.run_number }}
          restore-keys: |
            ${{ matrix.cache-key }}-run
            ${{ matrix.cache-key }}

      - name: Bootstrap AI model
        id: bootstrap
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: node scripts/bootstrap-ai-model.mjs --browser msedge-dev --profile .playwright-profiles/msedge-dev --timeout 600000 --perf-param ${{ matrix.perf-param }}

      - name: Save AI model cache (post-bootstrap)
        if: ${{ steps.model-cache.outputs.cache-hit != 'true' && steps.bootstrap.outcome == 'success' }}
        uses: actions/cache/save@v5
        with:
          path: .playwright-profiles/msedge-dev
          key: ${{ matrix.cache-key }}-run${{ github.run_number }}-bootstrap

      - name: Log ONNX Runtime version and model config
        if: steps.bootstrap.outcome != 'failure'
        shell: pwsh
        run: |
          $rtDir = Get-ChildItem ".playwright-profiles/msedge-dev/EdgeLLMRuntime" -Directory -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($rtDir) {
            $ort = (Get-Item (Join-Path $rtDir.FullName 'onnxruntime.dll') -ErrorAction SilentlyContinue)
            $genai = (Get-Item (Join-Path $rtDir.FullName 'onnxruntime-genai.dll') -ErrorAction SilentlyContinue)
            if ($ort) { Write-Output "ONNX Runtime: $($ort.VersionInfo.FileVersion)" }
            if ($genai) { Write-Output "GenAI: $($genai.VersionInfo.FileVersion)" }
          }
          $configFile = Get-ChildItem ".playwright-profiles/msedge-dev/EdgeLLMOnDeviceModel/*/genai_config.json" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($configFile) { Get-Content $configFile.FullName }

      - name: Run e2e tests
        if: steps.bootstrap.outcome != 'failure'
        id: e2e-tests
        timeout-minutes: 45
        run: npm exec nx -- e2e in-browser-ai-coding-agent-e2e -c edge

      - name: Run unit tests
        if: ${{ !cancelled() && steps.bootstrap.outcome != 'failure' }}
        id: unit-tests
        timeout-minutes: 45
        shell: bash
        run: |
          set -o pipefail
          npm exec nx -- test-edge in-browser-ai-coding-agent 2>&1 | tee unit-test-output.log

      - name: Write prompt responses to job summary
        if: ${{ !cancelled() && steps.bootstrap.outcome != 'failure' }}
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const log = fs.readFileSync('unit-test-output.log', 'utf8').replace(/\x1b\[[0-9;]*m/g, '');
            const re = /\[unit\] (.+?): \"(.+?)\"\n\[unit-response\]([\s\S]*?)\[\/unit-response\]/g;
            let md = '', m;
            while ((m = re.exec(log))) {
              md += '### Unit Test ' + m[1] + '\n\n**Prompt:** ' + m[2] + '\n\n**Response:** ' + m[3] + '\n\n';
            }
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, md || '_No prompt responses captured_\n');
          "

      - name: Log inference cache state
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          echo "=== Inference cache files ==="
          ls -la .playwright-profiles/msedge-dev/EdgeLLMOnDeviceModel/*/adapter_cache.bin 2>/dev/null || echo "No adapter_cache.bin"
          ls -la .playwright-profiles/msedge-dev/EdgeLLMOnDeviceModel/*/encoder_cache.bin 2>/dev/null || echo "No encoder_cache.bin"
          echo "=== ONNX Runtime DLLs ==="
          ls -la .playwright-profiles/msedge-dev/EdgeLLMRuntime/*/onnxruntime*.dll 2>/dev/null || echo "No ONNX Runtime DLLs"

      - name: Save AI model cache (post-test)
        if: ${{ !cancelled() && steps.bootstrap.outcome != 'failure' }}
        uses: actions/cache/save@v5
        with:
          path: .playwright-profiles/msedge-dev
          key: ${{ matrix.cache-key }}-run${{ github.run_number }}
