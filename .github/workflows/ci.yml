name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read
  packages: read

jobs:
  ghcr:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.base }}
    steps:
      - id: image
        run: echo "base=ghcr.io/${GITHUB_REPOSITORY,,}/playwright" >> "$GITHUB_OUTPUT"

  format:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - run: npm ci
      - run: npm exec nx -- format:check

  lint-typecheck-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - run: npm ci
      - run: npm exec nx -- run-many -t lint typecheck build

  test:
    needs: ghcr
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chrome-beta
            project: chrome-gemini-nano
            cache-key: chrome-beta-ai-model-v1
          - browser: msedge-dev
            project: edge-phi4-mini
            cache-key: msedge-dev-ai-model-v1
    container:
      image: ${{ needs.ghcr.outputs.image }}-${{ matrix.browser }}:latest
      options: --ipc=host --user 1001
    steps:
      - uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v5

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - run: npm ci

      - name: Restore AI model cache
        uses: actions/cache/restore@v5
        id: model-cache
        with:
          path: .playwright-profiles/${{ matrix.browser }}
          key: ${{ matrix.cache-key }}

      - name: Bootstrap AI model
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: xvfb-run --auto-servernum node scripts/bootstrap-ai-model.mjs --browser ${{ matrix.browser }} --profile .playwright-profiles/${{ matrix.browser }} --timeout 300000

      - name: Save AI model cache
        if: steps.model-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: .playwright-profiles/${{ matrix.browser }}
          key: ${{ matrix.cache-key }}

      - name: Run unit tests (${{ matrix.project }})
        run: xvfb-run --auto-servernum npm exec nx -- test in-browser-ai-coding-agent --project=${{ matrix.project }}

      - name: Run e2e tests (${{ matrix.project }})
        run: xvfb-run --auto-servernum npm exec nx -- e2e in-browser-ai-coding-agent-e2e --project=${{ matrix.project }}
