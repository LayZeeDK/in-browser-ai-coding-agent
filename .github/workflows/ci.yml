name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: nrwl/nx-set-shas@v5

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'npm'

      - run: npm ci
      - run: npx playwright install --only-shell

      - name: Run all targets (main)
        if: github.event_name == 'push'
        run: npx nx run-many -t lint test build typecheck e2e

      - name: Run affected targets (PR)
        if: github.event_name == 'pull_request'
        run: npx nx affected -t lint test build typecheck e2e
