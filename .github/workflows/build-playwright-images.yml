name: Build Playwright Images

on:
  push:
    branches: [main]
    paths:
      - .node-version
      - package-lock.json
      - .github/docker/Dockerfile
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome-beta, msedge-dev]
    steps:
      - uses: actions/checkout@v6

      - name: Extract versions
        id: versions
        run: |
          echo "playwright=$(node -e "console.log(require('./package-lock.json').packages['node_modules/playwright-core'].version)")" >> "$GITHUB_OUTPUT"
          echo "node=$(cat .node-version)" >> "$GITHUB_OUTPUT"

      - name: Lowercase repository name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .github/docker
          target: ${{ matrix.browser }}
          push: true
          build-args: |
            PLAYWRIGHT_VERSION=${{ steps.versions.outputs.playwright }}
            NODE_VERSION=${{ steps.versions.outputs.node }}
          tags: |
            ghcr.io/${{ env.REPO }}/playwright-${{ matrix.browser }}:v${{ steps.versions.outputs.playwright }}
            ghcr.io/${{ env.REPO }}/playwright-${{ matrix.browser }}:latest
          cache-from: type=gha,scope=playwright-${{ matrix.browser }}
          cache-to: type=gha,scope=playwright-${{ matrix.browser }},mode=max
