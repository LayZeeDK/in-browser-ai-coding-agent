name: Build Playwright Images

on:
  push:
    branches: [main]
    paths:
      - .node-version
      - package-lock.json
      - .github/docker/Dockerfile
      - .github/docker/bootstrap-model.mjs
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract versions
        id: versions
        run: |
          echo "playwright=$(node -e "console.log(require('./package-lock.json').packages['node_modules/playwright-core'].version)")" >> "$GITHUB_OUTPUT"
          echo "node=$(cat .node-version)" >> "$GITHUB_OUTPUT"

      - name: Lowercase repository name
        run: echo "REPO=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 1: Build the base image (Chrome + flags, no model)
      - name: Build base image
        uses: docker/build-push-action@v7
        with:
          context: .github/docker
          target: chrome-beta
          load: true
          build-args: |
            PLAYWRIGHT_VERSION=${{ steps.versions.outputs.playwright }}
            NODE_VERSION=${{ steps.versions.outputs.node }}
          tags: chrome-beta-base:local
          cache-from: type=gha,scope=playwright-chrome-beta
          cache-to: type=gha,scope=playwright-chrome-beta,mode=max

      # Step 2: Run the container with --ipc=host to download model + warm up.
      # Chrome needs shared memory IPC which isn't available during docker build.
      - name: Bootstrap model in container
        run: |
          docker run --ipc=host --name chrome-bootstrap chrome-beta-base:local \
            xvfb-run --auto-servernum node /opt/bootstrap-model.mjs

      # Step 3: Commit the container with model baked in and push
      - name: Commit and push image
        run: |
          IMAGE="ghcr.io/${{ env.REPO }}/playwright-chrome-beta"
          docker commit chrome-bootstrap "$IMAGE:v${{ steps.versions.outputs.playwright }}"
          docker tag "$IMAGE:v${{ steps.versions.outputs.playwright }}" "$IMAGE:latest"
          docker push "$IMAGE:v${{ steps.versions.outputs.playwright }}"
          docker push "$IMAGE:latest"
          docker rm chrome-bootstrap
